<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak - Interactive Surprise</title>
    <style>
        :root {
            --primary: #ff9f43;
            --secondary: #ff6b6b;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b132b;
            color: white;
            overflow: hidden;
            text-align: center;
        }

        .hidden { display: none !important; }

        /* Home Page */
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1c2541 0%, #0b132b 100%);
        }

        .home-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 90%;
        }

        h1 { font-size: 2.5em; color: var(--gold); text-shadow: 0 0 15px var(--gold); margin-bottom: 10px; }
        p { font-size: 1.1em; opacity: 0.9; margin-bottom: 25px; }

        .btn-start {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-start:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 8px 20px rgba(255, 107, 107, 0.6); }

        /* Game UI */
        #game-screen {
            height: 100vh;
            background: #1a1a2e;
            position: relative;
            cursor: none;
        }

        #scoreboard {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1.5em;
            color: var(--gold);
            z-index: 100;
        }

        #player {
            position: absolute;
            width: 50px;
            height: 50px;
            background: url('https://cdn-icons-png.flaticon.com/512/2271/2271062.png');
            background-size: contain;
            pointer-events: none;
            z-index: 50;
            filter: drop-shadow(0 0 10px var(--secondary));
        }

        .salami {
            position: absolute;
            width: 40px;
            height: 40px;
            background: url('https://cdn-icons-png.flaticon.com/512/2489/2489756.png');
            background-size: contain;
            transition: 0.2s;
            animation: bounce 1.5s infinite alternate;
        }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        /* Message Page */
        #message-screen {
            min-height: 100vh;
            background: #fff;
            color: #222;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .letter {
            max-width: 600px;
            background: #fffaf0;
            padding: 30px;
            border: 2px solid #f1c40f;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        .msg-line { opacity: 0; transform: translateY(15px); transition: 0.8s; margin: 15px 0; font-size: 1.2em; line-height: 1.6; }
        .msg-line.reveal { opacity: 1; transform: translateY(0); }

        /* Confetti */
        .confetti { position: fixed; width: 10px; height: 10px; z-index: 1000; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }

    </style>
</head>
<body>

    <audio id="eidMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <section id="home-screen" class="container">
        <div class="home-card">
            <h1>Eid Mubarak 🌙</h1>
            <p>সালামি সংগ্রহ করতে গেমটি শুরু করুন!</p>
            <button class="btn-start" onclick="initGame()">Celebrate Now</button>
        </div>
    </section>

    <section id="game-screen" class="hidden">
        <div id="scoreboard">সালামি: 0</div>
        <div id="player"></div>
    </section>

    <section id="message-screen" class="hidden">
        <div class="letter">
            <h2 style="color: #d35400;">🌙 ঈদ মোবারক 🌙</h2>
            <p class="msg-line">প্রিয় বন্ধু,</p>
            <p class="msg-line">সব আনন্দ আর খুশি নিয়ে আসুক এই ঈদ।</p>
            <p class="msg-line">আল্লাহ আপনার এবং আপনার পরিবারের ওপর রহমত বর্ষণ করুন।</p>
            <p class="msg-line">প্রতিটি দিন হোক ঈদের মতো আনন্দময়।</p>
            <p class="msg-line"><strong>ঈদ মোবারক! 💛</strong></p>
        </div>
        <img src="https://media.giphy.com/media/xT1XGzU0Tfq2E6N39S/giphy.gif" width="200" style="margin-top: 20px; border-radius: 10px;">
        <button class="btn-start" style="margin-top: 30px;" onclick="location.reload()">আবার খেলুন</button>
    </section>

    <script>
        let score = 0;
        let gameActive = false;
        let salamis = [];

        function initGame() {
            document.getElementById('eidMusic').play();
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            gameActive = true;
            
            const player = document.getElementById('player');
            
            // Player Movement
            window.addEventListener('mousemove', (e) => {
                if(!gameActive) return;
